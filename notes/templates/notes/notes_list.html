{% extends "base.html" %}

{% block content %}

    <!-- <form action="{% url 'logout' %}" method="POST" class="btn btn-danger">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger float-end">Logout</button>
    </form> -->
    <h1>This was the Notes was Listed : </h1>

    <div class="row row-cols3 g2">
        {% for note in notes %}
        <div class="col">
            <div class="p-3 border">
                <a href="{% url 'notes.detail' pk=note.pk %}" class="text-dark text-decoration-non">
                    <h3>{{note.title}}</h3>
                </a>
                {{note.text|truncatechars:10}}
            </div>
        </div>
        {% endfor %}
    </div>
{% endblock %}
